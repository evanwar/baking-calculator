<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Recetas - Conchas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-amber-800 mb-2">🥐 Calculadora de Recetas</h1>
            <p class="text-gray-600 text-lg">Selecciona tu receta y calcula los ingredientes según las tandas</p>
        </div>

        <!-- Main Content -->
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Recipe Selection -->
            <div class="bg-gradient-to-r from-amber-600 to-orange-600 p-6">
                <h2 class="text-2xl font-bold text-white mb-4">Selecciona una Receta</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onclick="selectRecipe('conchas')" id="btn-conchas" 
                        class="recipe-btn bg-white text-amber-800 px-6 py-4 rounded-lg font-semibold hover:bg-amber-100 hover:text-amber-900 transition-all transform hover:scale-105 shadow-md hover:shadow-xl">
                        🐚 Conchas
                    </button>
                    <button onclick="selectRecipe('donas')" id="btn-donas"
                        class="recipe-btn bg-white text-amber-800 px-6 py-4 rounded-lg font-semibold hover:bg-amber-100 hover:text-amber-900 transition-all transform hover:scale-105 shadow-md hover:shadow-xl">
                        🍩 Donas sin Huevo
                    </button>
                    <button onclick="selectRecipe('roles')" id="btn-roles"
                        class="recipe-btn bg-white text-amber-800 px-6 py-4 rounded-lg font-semibold hover:bg-amber-100 hover:text-amber-900 transition-all transform hover:scale-105 shadow-md hover:shadow-xl">
                        🥐 Roles Esponjosos
                    </button>
                </div>
            </div>

            <!-- Batch Input -->
            <div class="p-6 border-b border-gray-200">
                <label class="block text-xl font-semibold text-gray-700 mb-3">
                    ¿Cuántas tandas quieres hacer?
                </label>
                <div class="flex items-center gap-4">
                    <input type="number" id="batchInput" min="0.25" step="0.25" value="1" 
                        class="flex-1 px-4 py-3 text-xl border-2 border-amber-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent"
                        oninput="calculateIngredients()">
                    <span class="text-gray-600 text-lg">tandas</span>
                </div>
                <p class="mt-2 text-sm text-gray-500">Puedes usar decimales (ej: 1.5, 2.5, 0.5)</p>
            </div>

            <!-- Recipe Info -->
            <div id="recipeInfo" class="p-6 bg-amber-50 hidden">
                <h3 class="text-2xl font-bold text-amber-800 mb-2" id="recipeName"></h3>
                <p class="text-gray-600" id="recipeDescription"></p>
            </div>

            <!-- Ingredients List -->
            <div id="ingredientsList" class="p-6">
                <div class="text-center text-gray-400 py-12">
                    <svg class="w-24 h-24 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <p class="text-xl font-semibold">Selecciona una receta para comenzar</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-gray-600">
            <p>💝 Hecho con amor para preparar las mejores conchas</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
